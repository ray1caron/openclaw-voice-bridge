# Voice Bridge Configuration
# Copy to the first location that suits your setup (checked in order):
#   ~/.voice-bridge/config.yaml          (legacy default)
#   $XDG_CONFIG_HOME/voice-bridge/config.yaml  (XDG preferred, ~/.config/voice-bridge/ when unset)
# Or point directly with: VOICE_BRIDGE_CONFIG=/path/to/config.yaml

# OpenClaw Connection
openclaw:
  host: "localhost"
  port: 18789
  secure: false
  timeout: 30.0
  timeout_ms: 30000
  api_mode: "http"          # "http" or "websocket"
  ws_path: "/api/voice"
  auth_token: null           # Env vars take priority: OPENCLAW_GATEWAY_TOKEN or OPENCLAW_TOKEN

# Audio Settings
audio:
  input_device: "default"    # Use "default" or specific device name
  output_device: "default"   # Use "default" or specific device name
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  wake_word_frame_size: 1280  # 80ms at 16kHz

# Speech-to-Text (Whisper)
stt:
  model: "base"              # Options: tiny, base, small, medium, large-v3
  language: null             # null = auto-detect
  device: "auto"             # Options: cpu, cuda, auto
  compute_type: "int8"
  beam_size: 5
  vad_filter: false          # Disabled - uses WebRTC VAD instead
  vad_threshold: 0.5

# Text-to-Speech (Piper)
tts:
  voice: "en_US-lessac-medium"
  speed: 1.0
  volume: 1.0

# Wake Word Detection
wake_word:
  wake_word: "computer"      # Phrase to listen for
  backend: "stt"             # "stt" (reliable) or "openwakeword" (fast)
  openwakeword_model: "hey_mycroft"
  openwakeword_threshold: 0.15
  refractory_seconds: 2.0

# Bridge Behavior
bridge:
  response_timeout: 10.0
  max_session_duration: 300.0
  log_level: "INFO"          # Options: DEBUG, INFO, WARNING, ERROR
  hot_reload: true

  # WebSocket server — clients (e.g. OpenClaw Gateway) connect here
  websocket_server:
    host: "0.0.0.0"
    port: 18790
    max_connections: 10

  # Wake word acknowledgement - OpenClaw responds with a spoken phrase
  acknowledgement:
    enabled: true
    timeout_ms: 5000          # ms to wait for OpenClaw's ack response

  # Interactive conversation mode
  # After the wake word, the bridge stays in conversation until cancelled
  interactive:
    enabled: true
    idle_timeout_seconds: 30.0  # exit after this many seconds of silence
    cancel_phrases:             # say any of these to end the session
      - "stop"
      - "cancel"
      - "nevermind"
      - "never mind"
      - "exit"
      - "goodbye"
      - "bye"

# Session Persistence
persistence:
  enabled: true
  db_path: null              # null = use default path
  ttl_minutes: 30
  max_history: 10
  cleanup_interval: 60       # Must be < ttl_minutes * 60 (i.e. < 1800s with defaults)
